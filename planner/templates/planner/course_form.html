{% extends 'planner/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card section-card">
            <div class="card-body">
                <h1 class="mb-4">
                    {% if form.instance.pk %}
                        Edit Course
                    {% else %}
                        Add Course
                    {% endif %}
                </h1>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_name" class="form-label">Course Name</label>
                        <input
                            type="text"
                            name="name"
                            id="id_name"
                            class="form-control"
                            value="{{ form.name.value|default_if_none:'' }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="id_code" class="form-label">Course Code</label>
                        <input
                            type="text"
                            name="code"
                            id="id_code"
                            class="form-control"
                            value="{{ form.code.value|default_if_none:'' }}"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="id_description" class="form-label">Description</label>
                        <textarea
                            name="description"
                            id="id_description"
                            class="form-control"
                            rows="4"
                            placeholder="Optional: add some notes about this course"
                        >{{ form.description.value|default_if_none:'' }}</textarea>
                        <div class="form-text">
                            Optional. You can leave this blank.
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a href="{% url 'course_list' %}" class="btn btn-outline-secondary">Back to Courses</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
