{% extends 'planner/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">Courses</h1>
    <a href="{% url 'course_create' %}" class="btn btn-primary">Add Course</a>
</div>

<div class="card section-card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" aria-label="Courses table">
                <thead class="table-light">
                    <tr>
                        <th scope="col">Course Name</th>
                        <th scope="col">Course Code</th>
                    </tr>
                </thead>
                <tbody>
                    {% for course in courses %}
                        <tr>
                            <td>{{ course.name }}</td>
                            <td>{{ course.code }}</td>
                        </tr>
                    {% empty %}
                        <tr>
                            <td colspan="2">No courses</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
